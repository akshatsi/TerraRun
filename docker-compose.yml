version: "3.8"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: intvl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-intvl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intvl_secret}
      POSTGRES_DB: ${POSTGRES_DB:-intvl}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intvl"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intvl_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
